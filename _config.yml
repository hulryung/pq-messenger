title: "pq-messenger"
author: "hulryung"
copyright: "2026"
logo: ""

only_build_toc_files: true

exclude_patterns:
  - .venv
  - _build
  - _extra
  - tests
  - pqmsg
  - pqmsg.egg-info
  - docs
  - ko
  - .pytest_cache
  - node_modules
  - "**.ipynb_checkpoints"

execute:
  execute_notebooks: cache
  timeout: 180
  allow_errors: false

repository:
  url: https://github.com/hulryung/pq-messenger
  branch: main

html:
  use_issues_button: true
  use_repository_button: true
  use_edit_page_button: false

sphinx:
  extra_extensions:
    - sphinx_sitemap
    - sphinxext.opengraph
    - sphinx_last_updated_by_git
    - sphinx.ext.autodoc
    - sphinx.ext.napoleon
  config:
    html_show_copyright: false
    html_last_updated_fmt: "%Y-%m-%dT%H:%M:%S+00:00"
    html_baseurl: "https://hulryung.github.io/pq-messenger/"
    html_static_path: ["_static"]
    html_extra_path: ["_extra"]
    templates_path: ["_templates"]
    html_css_files:
      - custom.css
    html_meta:
      description: "Signal-style post-quantum messenger CLI — educational capstone using ML-KEM. Hybrid X3DH + symmetric ratchet in pure Python."
      keywords: "post-quantum cryptography, ML-KEM, Kyber, Signal, X3DH, ratchet, messenger, Python"
      author: "hulryung"
    sitemap_url_scheme: "{link}"
    sitemap_show_lastmod: true
    sitemap_indent: 2
    ogp_site_url: "https://hulryung.github.io/pq-messenger/"
    ogp_site_name: "pq-messenger"
    ogp_description_length: 200
    ogp_type: "article"
    html_theme_options:
      use_download_button: true
