title: "pq-messenger (한국어)"
author: "hulryung"
copyright: "2026"
logo: ""

only_build_toc_files: true

exclude_patterns:
  - .venv
  - _build
  - "**.ipynb_checkpoints"
  - _translate.py

execute:
  execute_notebooks: cache
  timeout: 180
  allow_errors: false

repository:
  url: https://github.com/hulryung/pq-messenger
  branch: main

html:
  use_issues_button: true
  use_repository_button: true
  use_edit_page_button: false

sphinx:
  extra_extensions:
    - sphinx_sitemap
    - sphinxext.opengraph
    - sphinx_last_updated_by_git
    - sphinx.ext.autodoc
    - sphinx.ext.napoleon
    - sphinxcontrib.mermaid
  config:
    language: ko
    html_show_copyright: false
    html_last_updated_fmt: "%Y-%m-%dT%H:%M:%S+00:00"
    html_baseurl: "https://pqmsg.hulryung.com/ko/"
    html_static_path: ["../_static"]
    templates_path: ["../_templates"]
    html_css_files:
      - custom.css
    html_meta:
      description: "Signal 스타일의 포스트 양자 메신저 CLI — ML-KEM 기반 교육용 캡스톤. 순수 파이썬으로 구현한 하이브리드 X3DH + 대칭 래칫."
      keywords: "포스트 양자 암호, ML-KEM, Kyber, Signal, X3DH, 래칫, 메신저, 파이썬, post-quantum cryptography"
      author: "hulryung"
    sitemap_url_scheme: "{link}"
    sitemap_show_lastmod: true
    sitemap_indent: 2
    ogp_site_url: "https://pqmsg.hulryung.com/ko/"
    ogp_site_name: "pq-messenger (한국어)"
    ogp_description_length: 200
    ogp_type: "article"
    html_theme_options:
      use_download_button: true
