name: deploy-book

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-book
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout pq-messenger
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: pq-messenger

      - name: Checkout ml-kem-notebooks (pqc-edu source)
        uses: actions/checkout@v4
        with:
          repository: hulryung/ml-kem-notebooks
          path: ml-kem-notebooks

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Cache jupyter execution outputs
        uses: actions/cache@v4
        with:
          path: |
            pq-messenger/_build/.jupyter_cache
            pq-messenger/ko/_build/.jupyter_cache
          key: jupyter-cache-${{ runner.os }}-${{ hashFiles('pq-messenger/notebooks/**/*.ipynb', 'pq-messenger/ko/notebooks/**/*.ipynb', 'pq-messenger/pqmsg/**/*.py', 'ml-kem-notebooks/pqc_edu/**/*.py') }}
          restore-keys: |
            jupyter-cache-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ./ml-kem-notebooks
          pip install -e "./pq-messenger[dev,book]"

      - name: Run tests
        run: |
          cd pq-messenger && pytest tests/ -v

      - name: Build the book (English)
        run: cd pq-messenger && jupyter-book build .

      - name: Build the book (Korean)
        run: cd pq-messenger && jupyter-book build ko/

      - name: Merge Korean build into English site
        run: cd pq-messenger && cp -r ko/_build/html _build/html/ko

      - name: Deploy to Vercel (pqmsg.hulryung.com)
        run: |
          cd pq-messenger/_build/html
          npx --yes vercel@latest deploy --prod --yes --token="$VERCEL_TOKEN"
